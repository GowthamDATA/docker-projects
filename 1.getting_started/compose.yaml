services:   
  redis:     
    image: redis:alpine     
    container_name: redis-server     
    restart: unless-stopped     
    ports:       
      - "6379:6379"
  app:     
    image: app1:latest
    container_name: custom_app     
    ports:       
      - "5000:5000"
    environment:
      - REDIS_HOST=redis-server
      - REDIS_PORT=6379
 